databases:
  - name: shaxsiyat-db
    plan: free
    databaseName: shaxsiyat_db
    user: shaxsiyat_user

services:
  - type: web
    plan: free
    name: shaxsiyat-app
    runtime: node
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shaxsiyat-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
